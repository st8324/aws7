<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>게시판 예제</title>
	<style>
		#form{
			/* 임의의 너비. 강사 마음대로 지정 */
			width: 500px;
			/* 고정 너비를 기준으로 좌우 가운데 정렬 */
			margin: 0 auto; 
			/* 컨텐츠 시작 위치 조절 */
			padding: 10px;
			/* 박스 그림자로 테두리 효과 */
			box-shadow: 0 0 2px 0 rgba(0,0,0,0.7);
			/* 둥근 테두리 */
			border-radius: 5px;
		}
		.form-control{
			/* 요소를 한 라인에 배치하고 너비를 부모 너비만큼 잡기 위해서 */
			display: block; width: 100%; 
			/* 테두리를 포함해서 너비가 100%가 되도록. 설정 안하면 오른쪽 여백이 조금 작음 */
			box-sizing: border-box;
			/* 아래 요소 간격 조절  */
			margin-bottom: 10px;
			/* 높이와 글씨 크기 조절 */
			height: 50px; font-size: 18px;
			/* 둥근 테두리 */
			border-radius: 5px;
		}
		textarea.form-control{
			height: 400px;
		}
		.btn{
			/* 버튼을 길게 만듬 */
			display: block; width: 100%;
			/* 테두리 포함해서 너비가 계산되도록.  */
			box-sizing: border-box;
			/* 마우스 커서를 포인터로 */
			cursor: pointer;
		}
		.table{
			width: 500px;
			/* 좌우 가운데, 위 아래 여백 20px */
			margin: 20px auto;
			/* 테이블 안 테두리 들이 겹치게 하기 위해 */
			border-collapse: collapse;
		}
		.table tr{
			/* 한 행의 테이블 지정 */
			border: 1px solid black;
			/* 좌우 테두리 제거 */
			border-width: 1px 0;
			/* 한 라인의 높이를 30px로 하기 위해 한줄의 높이 지정 */
			line-height: 30px;
		}
		/* 번호는 너비가 부모 너비의 10%, 가운데 정렬 */
		.table thead th:nth-of-type(1), 
		.table tbody td:nth-of-type(1) {
			width: 10%; text-align: center;
		}
		/* 제목은 너비가 부모 너비의 70% */
		.table thead th:nth-of-type(2), 
		.table tbody td:nth-of-type(2){
			width: 70%;
		}
		/* 작성자는 너비가 부모 너비의 20%, 가운데 정렬 */
		.table thead th:nth-of-type(3), 
		.table tbody td:nth-of-type(3){
			width: 20%; text-align: center;
		}
	</style>
</head>
<body>
	<form action="" id="form">
		<!-- 제목, 내용, 작성자를 입력하여 게시글 등록 -->
		<!-- 
		id : 요소를 선택하기 쉽게하기 위해. class : 간단하게 꾸미기 위해서
		placeholder : 안내 문구, name : 여기선 사용하지 않지만 나중에 리액트에서 쉽게 처리하기 위해 습관을 들임
		-->
		<input type="text" id="title" name="title" class="form-control" placeholder="제목을 입력하세요.">
		<input type="text" id="writer" name="writer" class="form-control" placeholder="작성자를 입력하세요.">
		<textarea name="content" id="content" class="form-control" placeholder="내용을 입력하세요."></textarea>
		<!-- 
		서버에 전송 이벤트를 실행하기 위해 type을 submit으로 지정(또는 생략) -->
		<button class="btn">등록</button>
	</form>
	<table class="table">
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
			</tr>
		</thead>
		<tbody>
			<!-- <tr>
				<td>1</td>
				<td>
					<a href="#">게시글</a>
				</td>
				<td>admin</td>
			</tr> -->
		</tbody>
	</table>

	<script>

		//현재 등록된 게시글들을 관리하는 배열
		let posts = [];

		//form태그 전송될 때(등록 버튼을 클릭했을 때) 이벤트 등록
		//1. 요소 선택
		const form = document.querySelector('#form');
		//2. 이벤트 등록
		form.addEventListener('submit', function(e){
			//전송 기능 막기
			e.preventDefault(); //태그의 기본 기능을 막음. 서버로 전송하는 기능을 막음

			//제목이 있는 요소 선택
			const titleEl = document.querySelector('#title');	
			
			//제목 가져오기
			let title = titleEl.value;

			//작성자가 있는 요소 선택
			const writerEl = document.querySelector('#writer');	
			//작성자 가져오기
			let writer = writerEl.value;

			//내용이 있는 요소를 선택
			const contentEl = document.querySelector('#content');	
			//내용 가져오기
			let content = contentEl.value;

			//제목, 작성자, 내용을 이용하여 객체를 생성
			let post = {
				num : posts.length + 1,
				// 왼쪽 title은 속성명. 오른쪽은 화면에서 읽어온 제목
				title : title,
				writer : writer,
				content : content
			}
			
			//게시글을 테이블에 추가
			insertPostToTable(post)

			//로컬 스토리지에 저장
			posts.push(post)
			localStorage.setItem('posts', JSON.stringify(posts))
		});
		function insertPostToTable(post){
			// 게시글이 비어 있으면
			if(!post){
				return;
			}
			//1. 게시글 정보를 추가할 요소를 선택
			const tdobyEl = document.querySelector('.table tbody');
			let str = `
				<tr>
					<td>${post.num}</td>
					<td>
						<a href="#">${post.title}</a>
					</td>
					<td>${post.writer}</td>
				</tr>
			`
			tdobyEl.innerHTML = tdobyEl.innerHTML + str;
		}

		//화면이 로딩되면 로컬 스토리지에 있는 게시글 목록을 가져와서 화면에 출력
		document.addEventListener('DOMContentLoaded', function(){
			//로컬 저장소에서 게시글 목록을 가져와서 객체로 변환(배열로 변환)
			posts = JSON.parse(localStorage.getItem('posts'));
			
			//저장된 게시글 목록이 없으면
			if(!posts){
				posts = [];
				return;
			}

			//가져온 게시글 목록을 반복문으로 화면에 출력
			for(i = 0 ; i < posts.length; ++i){
				let post = posts[i];
				insertPostToTable(post);
			}
		});
	</script>
</body>
</html>
