<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Local Storage</title>
</head>
<body>
	<input type="text" id="text">
	<button id="btnAdd">추가</button>
	<button id="btnSave">로컬 저장소에 저장</button>
	<h1>입력된 내용</h1>
	<ul id="list"></ul>
	<h1>저장된 내용</h1>
	<ul id="list-save"></ul>

	<script>
		/* 추가 버튼을 클릭하면 alert이 뜨도록 작업*/
		//추가 버튼 선택. id가 btnAdd인 요소를 선택
		const addBtn = document.querySelector('#btnAdd')

		//추가된 문구를 저장할 변수
		let list = [];

		//추가 버튼에 click 이벤트 등록 후, alert을 이용해서 구현(alert은 나중에 지움)
		addBtn.addEventListener('click', function(){
			//input태그 요소 선택. id가 text인 요소를 선택
			const textInput = document.querySelector('#text')
			//input태그에 입력된 값을 가져옴. input태그의 value는 표준속성
			let value = textInput.value;
			//가져온 값을 alert으로 띄움(확인용. 나중에 지울 코드)
			//alert(value)
			//list에 value를 추가(힌트 : 배열 예제 참고)
			list.push(value);
			//추가된 내용을 확인
			//console.log(list);

			//input태그에 입려된 값을 빈 문자열로 바꿈
			textInput.value = '';

			//id가 list인 요소를 선택
			const listUl = document.querySelector('#list');
			//value를 이용하여 li태그로 된 문자열을 만듬
			let str = `<li>${value}</li>`;

			//id가 list인 요소 제일 뒤에 li태그로 된 문자열을 추가(innerHTML 이용)
			listUl.innerHTML = listUl.innerHTML + str;
		});

		//로컬저장소에 저장 버튼을 선택
		const saveBtn = document.querySelector('#btnSave')
		//로컬저장소 저장버튼에 클릭 이벤트 등록
		saveBtn.addEventListener('click', function(){
			//alert으로 확인
			//alert(1)
			//list에 있는 내용을 로컬 스토리지에 저장함. 저장할 때 key는 list로 지정
			localStorage.setItem("list", JSON.stringify(list));


			//로컬 저장소에 있는 list를 가져옴(문자열)
			let itemStr = localStorage.getItem("list");
			
			//가져온 리스트를 배열로 변경
			let item = JSON.parse(itemStr);

			//아이디가 list-save인 요소를 선택
			const listSaveUl = document.querySelector('#list-save');
			console.log(item)
			//반복문 : 배열의 0번지부터 배열의 크기보다 작을때 까지 반복
			for(i = 0; i < item.length; ++i){
				//배열에서 가져온 값을 이용하여 li태그 문자열로 만듬 
				let str = `<li>${item[i]}</li>`;
				//만든 문자열을 list-save인 요소 뒤에 추가
				listSaveUl.innerHTML = listSaveUl.innerHTML + str;
			}		
		})
	</script>
</body>
</html>
