<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>구구단 예제</title>
</head>
<body>
	<script>
		//구구단 2단이 출력 되도록 코드를 작성하세요.
		//1~10을 한줄로 출력하는 예제를 1~9를 9줄로 출력하는 예제로 수정
		//1~9앞에는 2 X 를 추가 뒤에는 = 과 2와1~9의 곱을 출력
		let 숫자 = 1;
		for(숫자 = 1; 숫자 <= 9 ; ++숫자 ){
			document.write('2 X ' + 숫자 + ' = ' + 2 * 숫자 + '<br>');
			document.write(`2 X ${숫자} = ${2 * 숫자}<br>`);
		}
	</script>
</body>
</html>
