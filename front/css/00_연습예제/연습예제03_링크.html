<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연습예제</title>
	<style>
		a{
			/* 글자색 검정, 밑줄 제거 */
			color: black; text-decoration: none;
		}
		a:hover{
			/* 밑줄 추가 */
			text-decoration: underline;
		}
		a:visited{
			/* 글자 빨강 */
			color: red;
		}
	</style>
</head>
<body>
	<!--
	a태그의 글자색을 검정색으로 바꾸고 밑줄을 지우세요.
	a태그를 hover하면 글자에 밑줄이 생기게 바꾸세요.
	해당 링크를 방문하면 글자가 빨간색이 되도록 바꾸세요.
	-->
	<a href="//naver.com">네이버로 이동</a>
</body>
</html>
