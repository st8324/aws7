<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연습예제 이미지 정렬</title>
	<style>
		.right{ text-align: right;}
		.box{ width: 100px; background: yellow; height: 100px;}
	</style>
</head>
<body>
	<!-- 
		이미지를 오른쪽으로 배치(text-align)
	-->
	<div class="right">
		<img width="100" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-RGOGPV5PAQIslgjOPIJHG23ksa_j6VKZi49lLgh7Ag&s=10" alt="강아지">
		<!-- block태그는 text-align에 영향을 받지 않음 -->
		<div class="box"></div>
		1
	</div>
</body>
</html>
