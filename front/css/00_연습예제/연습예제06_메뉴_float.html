<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>메뉴- float 예제</title>
	<style>
		.list-menu{ border: 3px solid black;}
		.item-menu{ 
			height: 50px; float: left; width: 33.33%; box-sizing: border-box; 
			text-align: center; line-height: 50px;
		}
		.list-menu::after{ clear: both; content: ''; display: block;}
		.item-menu ~ .item-menu{ border-left: 3px solid black;}
		.link-menu{ color: black; text-decoration: none; display: block; }
		.item-menu:hover > .link-menu{ text-decoration: underline;}
		ul{ list-style: none; padding: 0;}
	</style>
</head>
<body>
	<!-- 
	메뉴 글자색은 검은색이고 밑줄 없음, hover하면 밑줄 추가
	메뉴 높이는 50px
	테두리 두께는 3px
	주의사항 : 메뉴와 메뉴사이의 테두리가 두꺼워지지 않도록 작업
	-->
	<header>
		<nav>
			<ul class="list-menu">
				<li class="item-menu">
					<a href="연습예제01_이미지 정렬.html" class="link-menu">메뉴1</a>
				</li>
				<li class="item-menu">
					<a href="#" class="link-menu">메뉴2</a>
				</li>
				<li class="item-menu">
					<a href="#" class="link-menu">메뉴3</a>
				</li>
			</ul>
		</nav>
	</header>

	<ul class="list-menu">
		<li class="item-menu">1</li>
		<li class="item-menu">2</li>
		<li class="item-menu">3</li>
	</ul>
</body>
</html>
