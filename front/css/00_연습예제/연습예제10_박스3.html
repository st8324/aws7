<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>박스 예제</title>
	<style>
		.container{ 
			/* 검은 색 테두리 */
			border: 3px solid black; width: 500px;
		}
		.wrap{ 
			/* 박스1,2의 바깥 여백을 지정하기 위해 wrap에 여백 지정 */
			padding: 10px; 
			/* 박스 색깔 지정 */
			background-color: skyblue;
		}
		.box{ 
			background-color: red; 
			/* 문제에서 박스 높이를 100px 지정 */
			height: 100px; 
			/* 위 아래 두 박스를 좌우로 배치하는데 공백없이 붙게 하기 위해서 */
			float: left;
			/* 박스의 너비로, 직접 계산하면 (500px - 30px) / 2 = 235px */
			/* 
			100% : 파란 박스 너비, 10px : 가운데 여백 1개, 2 : 박스 2개 
			=> 파란 박스 안에 박스 n개를 추가한다면 가운데 여백은 n-1개, 박스 개수는 n개이기 때문에
			  calc((100% - (n-1) * 여백크기 ) / n)
			*/
			width: calc( (100% - 3 * 10px) / 4 );
		}
		/* float이 적용된 속성의 부모요소는 아래를 지정해야 부모의 높이가 잡힘 */
		.wrap::after{ content: ''; display: block; clear: both;}

		/* 두번째 박스부터는 왼쪽에 10px 여백을 추가 */
		.box+.box{ margin-left: 10px;}
	</style>
</head>
<body>
	<div class="container">
		<!-- 
		wrap 박스를 추가한 이유는 파란 박스 영역이 500px이어야 하고, padding으로 박스들을 배치하더라도
		크기가 변경되지 않게 하기 위해서 추가
		=> wrap이 없다면 container의 width가 480px으로 해야 함
		-->
		<div class="wrap">
			<div class="box">1</div>
			<div class="box">2</div>
			<div class="box">3</div>
			<div class="box">4</div>
		</div>
	</div>
</body>
</html>
