<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>테이블 예제</title>
	<style>
		.table{
			border-collapse: collapse; width: 100%;
		}
		td, th{
			/* 전체 테두리 */
			/* border: 1px solid black; */
			/* 방법1.
			위 테두리 : 1px solid black 
			아래 테두리 : 1px solid black
			*/
			/* border-top: 1px solid black;
			border-bottom: 1px solid black; */

			/* 방법2 
			전체 테두리 : 1px solid black
			왼쪽테두리스타일 : none
			오른쪽테두리 스타일 : none
			*/
			/* border: 1px solid black;
			border-left-style: none;
			border-right-style: none;
			border-style: solid none; */

			/* 방법3
			전체 테두리 지정
			왼쪽테두리두께 : 0
			오른족테두리 두께 : 0
			 */
			border: 1px solid black;
			border-width: 1px 0;
		}
		tbody > tr:hover{
			background-color: yellow;
		}
	</style>
</head>
<body>
	<table class="table">
		<thead>
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성자</th>
				<th>조회수</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>2</td>
				<td>게시글입니다.</td>
				<td>관리자</td>
				<td>10</td>
			</tr>
			<tr>
				<td>1</td>
				<td>공지사항입니다.</td>
				<td>관리자</td>
				<td></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
