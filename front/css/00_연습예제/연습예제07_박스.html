<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>박스 예제</title>
	<style>
		/* margin을 이용하여 배치 */
		.container{
			width: 300px; height: 120px; border: 3px solid black; margin-bottom: 10px;
		}
		.box{ width: 280px; height: 100px; background: red;}
		.container>.box{margin: 10px;	}

		/* padding을 이용하여 배치 : 너비나 높이를 계산하지 않아도 됨 */
		.container1{ width: 300px; border: 3px solid black;}
		.wrap{ padding: 10px;}
		.container1>.box{ width: 100%; height: 100px; background-color: red;}
	</style>
</head>
<body>
	<!-- 컨테이너의 너비가 300px, 안에 들어가는 box 높이가 100px, 컨테이너와 box 사이의 여백이 10px -->
	<div class="container">
		<div class="box"></div>
	</div>
	<div class="container1">
		<div class="wrap">
			<div class="box"></div>
		</div>
	</div>
</body>
</html>
