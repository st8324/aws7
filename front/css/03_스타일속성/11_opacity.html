<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>opacity 예제</title>
	<style>
		/* 
		opacity (p.156)
		- 요소 사이의 투명도를 설정
		- 0~1사이의 실수값을 지정. 0.01, 0.3 등
		- 0이면 투명, 1이면 불투명
		- 부모 요소에 적용된 투명도가 자식 요소에도 적용됨
		*/
		.wrap{
			/* box의 기준이 되기 위해 */
			position: relative; height: 50px;
		}
		.box{
			/* h1태그를 가리기 위해서 */
			position: absolute;
			/*top bottom을 이용하여 높이 지정  */
			top: 0; bottom: 0; 
			/* left right를 이용하여 너비 지정 */
			left: 0; right: 0;
			/* 배경색을 지정하여 h1태그를 안보이게 함 */
			background-color: red;
			/* h1 태그가 조금 보이도록 투명도를 조절 */
			opacity: 1;
		}
		/* 빨간 배경에 마우스를 hover하면 반투명이 되도록(투명도를 0.3) 작업 */
		.box:hover{
			opacity: 0.3;
		}
	</style>
</head>
<body>
	<h1>투명도 예제</h1>
	<div class="container1">
		<div class="wrap">
			<h1>안녕하세요. </h1>
			<div class="box"></div>
		</div>
	</div>
</body>
</html>
