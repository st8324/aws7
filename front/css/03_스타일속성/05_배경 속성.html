<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>배경 속성 예제</title>
	<style>
		/* 
		background-color(p.127)
		- 배경색

		background-image(p.129)
		- 배경 이미지
		- url()함수 이용
		- url(이미지경로)
		- 네이버의 경우 아이콘을 배경 이미지로 처리

		background-repeat
		- 배경 이미지 반복
		- 요소가 이미지보다 클때 의미가 있음
		- 값
		  - repeat : x축, y축 반복
			- repeat-x : x축만 반복으로 채움(옆으로)
			- repeat-y : y축만 반복으로 채움(아래로)
			- no-repeat : 반복 안함
		
		background-position
		- 배경 이미지의 시작 위치를 지정
		- x축 y축 순으로 위치를 입력
		- 값
		  - 고정 px, %
			- left, center, right : x축 방향
			- top, center, bottom : y축 방향 
		
		background-size
		- 배경 이미지 크기를 변경
		- 너비 높이 순으로 입력
		- 값
			- 고정 px, %
			- auto : 이미지 원본 크기. 기본값
			- contain : 이미지가 요소 안으로 들어갈 수 있게 확대/축소. 여백이 생길수 있음
			- cover : 요소를 이미지가 덮을 수 있도록 확대/축소. 여백이 안 생김
		
		background-attachment
		- 배경 이미지를 고정하는 속성
		- 값
			- scroll : 기본값, 배경 이미지가 움직임
			- fixed : 배경 이미지가 움직이지 않게 고정

		background-clip
		- 박스 모델에서 배경 범위를 정하는 속성
		- 값
		  - border-box : 테두리까지 배경으로 봄
			- padding-box : 패딩까지 배경으로 봄
			- content-box : 컨텐츠만 배경으로 봄

		background-origin
		- 배경 이미지를 배치할 기준
		- 값
		  - border-box : 테두리부터 배경 배치
			- padding-box : 패딩부터 배경 배치
			- content-box : 컨텐츠부터 배경 배치
		*/
	</style>
</head>
<body>
	
</body>
</html>
