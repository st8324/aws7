<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>기본 선택자</title>
	<!-- 
	선택자
	- 요소(태그)를 선택하는 방법

	선택자를 이용한 스타일 적용 방법
	선택자{
		속성 : 값; 
		속성 : 값;
	}
	선택자{속성:값;속성:값}

	1. 전체 선택자(p.72)
	- *
	- 모든 태그를 선택
	- 우선 순위 : 0

	2. 태그 선택자(p.74)
	- 태그
	- 해당 태그들을 모두 선택
	- 우선 순위 : 1

	3. 클래스 선택자(p.86)
	- .클래스
	- 태그의 class 속성의 값이 일치하는 요소를 선택
	- class 속성은 기능은 없음. 스타일을 적용할 때 사용
	- 우선 순위 : 10

	4. 아이디 선택자(p.87)
	- #아이디
	- id 속성의 값이 일치하는 요소를 선택
	- 우선 순위 : 100

	선택자{
		속성 : 값 !important;
	}
		- !important : 우선순위를 무시하고 무조건 적용. 자주 사용하지 말자
	-->
	<style>
		*{	color: red ;}
		div{ font-size: 30px; color: blue;}
		.bg-yellow{ background: yellow; color: green;}
		#hi{ font-weight: bold; color: aqua;}
	</style>
</head>
<body>
	
	<div>안녕</div>
	<div class="bg-yellow box">안녕</div>
	<p>안녕</p>
	<span>안녕</span>
	<div id="hi">안녕</div>
	<a href="#" class="bg-yellow">안녕</a>
	
</body>
</html>
