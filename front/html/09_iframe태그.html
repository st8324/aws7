<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>iframe 태그 예제</title>
</head>
<body>
	<!-- 
	iframe 태그
	- 다른 문서를 가져와서 배치하는 태그
	- 속성
		- src : 가져올 문서를 지정
		- width/height : 프레임 너비/높이
		- name : 프레임 이름을 지정
		- frameborder : 테두리 두께를 지정. 잘 사용 안함 => 스타일로 처리
	- iframe 적용한 예시
		- youtube 영상 공유하기
		- 네이버 광고
	-->
	<h1>iframe 태그 예제</h1>
	<iframe src="02_a 태그.html" frameborder="1" width="300" height="300"></iframe>
	<br>
	<iframe width="560" height="315" src="https://www.youtube.com/embed/iPwajsJ7Z8E?si=RhfW731t1G9a_QqB" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
